---
name: 'tagged-release'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '*'

permissions:
  attestations: write
  id-token: write
  contents: write

jobs:
  tagged-release:
    name: tagged-release
    runs-on: ubuntu-24.04
    env:
      CI_BRANCH: release
      PACKAGECLOUD_REPOSITORY: dokku/dokku
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Get Repository Name
        id: repo-name
        run: |
          echo "REPOSITORY_NAME=$(echo "${{ github.repository }}" | cut -d '/' -f 2)" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          NAME: ${{ steps.repo-name.outputs.REPOSITORY_NAME }}
        run: |
          make build/darwin/${NAME}-amd64
          make build/darwin/${NAME}-arm64
          make build/linux/${NAME}-amd64
          make build/linux/${NAME}-arm64
          make build/windows/${NAME}-amd64.exe
          make build/windows/${NAME}-arm64.exe
          mkdir -p dist
          cp build/darwin/${NAME}-amd64       dist/${NAME}-darwin-amd64
          cp build/darwin/${NAME}-arm64       dist/${NAME}-darwin-arm64
          cp build/linux/${NAME}-amd64        dist/${NAME}-linux-amd64
          cp build/linux/${NAME}-arm64        dist/${NAME}-linux-arm64
          cp build/windows/${NAME}-amd64.exe  dist/${NAME}-windows-amd64.exe
          cp build/windows/${NAME}-arm64.exe  dist/${NAME}-windows-arm64.exe

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-darwin-amd64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-darwin-arm64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-amd64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-linux-arm64
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-windows-amd64.exe
            dist/${{ steps.repo-name.outputs.REPOSITORY_NAME }}-windows-arm64.exe

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: .github

      - name: Build Debian Packages
        run: |
          bundle exec make build/deb/${{ steps.repo-name.outputs.REPOSITORY_NAME }}_${{ github.ref_name }}_arm64.deb
          bundle exec make build/deb/${{ steps.repo-name.outputs.REPOSITORY_NAME }}_${{ github.ref_name }}_amd64.deb
          cp build/deb/*.deb dist/
        env:
          BUNDLE_GEMFILE: .github/Gemfile

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

      - name: Release to PackageCloud
        run: bundle exec make release-packagecloud
        env:
          BUNDLE_GEMFILE: .github/Gemfile
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: 'true'

  bump-formula:
    name: bump-formula
    runs-on: ubuntu-24.04
    needs: tagged-release
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          AMD64_SHA=$(sha256sum dist/docket-darwin-amd64 | awk '{print $1}')
          ARM64_SHA=$(sha256sum dist/docket-darwin-arm64 | awk '{print $1}')
          echo "amd64_sha=${AMD64_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-repo
        uses: actions/checkout@v6
        with:
          repository: dokku/homebrew-repo
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          path: homebrew-repo

      - name: Update formula
        env:
          AMD64_SHA: ${{ steps.checksums.outputs.amd64_sha }}
          ARM64_SHA: ${{ steps.checksums.outputs.arm64_sha }}
        working-directory: homebrew-repo
        run: |
          python3 - <<'PY'
          import os, re
          path = "Formula/docket.rb"
          with open(path) as f:
              content = f.read()

          version = os.environ["VERSION"]
          amd64_sha = os.environ["AMD64_SHA"]
          arm64_sha = os.environ["ARM64_SHA"]

          # Update the top-level `version "..."` line.
          content, n = re.subn(
              r'(^\s*version ")[^"]+(")',
              lambda m: f'{m.group(1)}{version}{m.group(2)}',
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if n != 1:
              raise SystemExit("failed to update version line")

          # Anchor each sha256 rewrite to the preceding arch-specific URL line.
          def replace_sha(text, arch, new_sha):
              pattern = re.compile(
                  r'(url "[^"]*darwin-' + re.escape(arch) + r'"\s*\n\s*sha256 ")'
                  r'[0-9a-fA-F]+(")',
                  re.MULTILINE,
              )
              new_text, n = pattern.subn(
                  lambda m: f'{m.group(1)}{new_sha}{m.group(2)}',
                  text,
                  count=1,
              )
              if n != 1:
                  raise SystemExit(f"failed to update sha256 for {arch}")
              return new_text

          content = replace_sha(content, "amd64", amd64_sha)
          content = replace_sha(content, "arm64", arm64_sha)

          with open(path, "w") as f:
              f.write(content)
          PY
          git --no-pager diff Formula/docket.rb

      - name: Open pull request on homebrew-repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        working-directory: homebrew-repo
        run: |
          git config user.name "Dokku Bot"
          git config user.email "no-reply@dokku.com"
          BRANCH="update-docket-${VERSION}"
          git checkout -b "${BRANCH}"
          git add Formula/docket.rb
          git commit -m "chore(docket): bump to ${VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --repo dokku/homebrew-repo \
            --head "${BRANCH}" \
            --base master \
            --title "chore(docket): bump to ${VERSION}" \
            --body "Automated bump of docket to ${VERSION}."
